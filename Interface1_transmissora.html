<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interface 1 - Transmissora Morse</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-color: #f8fafc;
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --success: #10b981;
            --danger: #ef4444;
            --border: #334155;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            width: 100%;
            max-width: 600px;
            background-color: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border);
        }
        h1 {
            font-size: 22px;
            margin-top: 0;
            text-align: center;
            color: var(--primary);
        }
        .status-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #111827;
            padding: 12px 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            border: 1px solid var(--border);
        }
        .status-dot {
            display: inline-block;
            width: 10px;
            height: 10px;
            background-color: var(--danger);
            border-radius: 50%;
            margin-right: 8px;
        }
        .status-dot.connected {
            background-color: var(--success);
            box-shadow: 0 0 8px var(--success);
        }
        button {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.2s;
        }
        button:hover {
            background-color: var(--primary-hover);
        }
        button:disabled {
            background-color: #475569;
            cursor: not-allowed;
            opacity: 0.6;
        }
        .input-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #94a3b8;
        }
        input[type="text"] {
            width: 100%;
            padding: 12px;
            background-color: #0f172a;
            border: 1px solid var(--border);
            border-radius: 6px;
            color: white;
            font-size: 16px;
            box-sizing: border-box;
        }
        input[type="text"]:focus {
            outline: none;
            border-color: var(--primary);
        }
        .btn-send {
            width: 100%;
            padding: 14px;
            font-size: 16px;
            background-color: var(--success);
        }
        .btn-send:hover {
            background-color: #059669;
        }
        .log-panel {
            margin-top: 25px;
        }
        .log-area {
            background-color: #000;
            font-family: 'Courier New', Courier, monospace;
            padding: 15px;
            border-radius: 6px;
            height: 150px;
            overflow-y: auto;
            border: 1px solid var(--border);
            font-size: 14px;
            color: #34d399;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>MÁQUINA 1 - Interface Transmissora</h1>
        
        <div class="status-panel">
            <div>
                <span id="status-dot" class="status-dot"></span>
                <span id="status-text">Desconectado</span>
            </div>
            <button id="btn-connect">Conectar Arduino</button>
        </div>

        <div class="input-group">
            <label for="msg-input">Mensagem para enviar (será convertida em Morse):</label>
            <input type="text" id="msg-input" placeholder="Digite sua mensagem aqui..." disabled>
        </div>

        <button id="btn-send" class="btn-send" disabled>Enviar Mensagem via IR</button>

        <div class="log-panel">
            <label>Histórico de Transmissão:</label>
            <div id="log-area" class="log-area">Aguardando conexão com a porta serial...<br></div>
        </div>
    </div>

    <script>
        let port;
        let writer;

        const btnConnect = document.getElementById('btn-connect');
        const btnSend = document.getElementById('btn-send');
        const msgInput = document.getElementById('msg-input');
        const statusDot = document.getElementById('status-dot');
        const statusText = document.getElementById('status-text');
        const logArea = document.getElementById('log-area');

        function appendLog(message) {
            const now = new Date().toLocaleTimeString();
            logArea.innerHTML += `[${now}] ${message}<br>`;
            logArea.scrollTop = logArea.scrollHeight;
        }

        btnConnect.addEventListener('click', async () => {
            if (port) {
                try {
                    if (writer) {
                        writer.releaseLock();
                    }
                    await port.close();
                    port = null;
                    writer = null;
                    btnConnect.textContent = 'Conectar Arduino';
                    statusDot.classList.remove('connected');
                    statusText.textContent = 'Desconectado';
                    msgInput.disabled = true;
                    btnSend.disabled = true;
                    appendLog('Porta serial desconectada.');
                } catch (err) {
                    appendLog('Erro ao desconectar: ' + err.message);
                }
                return;
            }

            try {
                if (!('serial' in navigator)) {
                    alert('A Web Serial API não é suportada neste navegador. Use o Google Chrome, Edge ou Opera.');
                    return;
                }

                port = await navigator.serial.requestPort();
                await port.open({ baudRate: 9600 });

                statusDot.classList.add('connected');
                statusText.textContent = 'Conectado (9600 baud)';
                btnConnect.textContent = 'Desconectar';
                msgInput.disabled = false;
                btnSend.disabled = false;
                appendLog('Conectado com sucesso ao Arduino Transmissor!');

            } catch (err) {
                appendLog('Erro ao conectar: ' + err.message);
                port = null;
                writer = null;
            }
        });

        btnSend.addEventListener('click', async () => {
            const text = msgInput.value.trim();
            if (!text) return;

            try {
                const encoder = new TextEncoder();
                writer = port.writable.getWriter(); // <--- CORRIGIDO PARA port.writable
                
                // Envia o texto adicionando a quebra de linha (\n) esperada pelo Arduino
                await writer.write(encoder.encode(text + '\n'));
                
                appendLog(`Transmitido: "${text}"`);
                msgInput.value = ''; 
                writer.releaseLock();
                writer = null;
            } catch (err) {
                appendLog('Erro ao enviar dados: ' + err.message);
                if (writer) {
                    writer.releaseLock();
                    writer = null;
                }
            }
        });

        msgInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !btnSend.disabled) {
                btnSend.click();
            }
        });
    </script>
</body>
</html>
